<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- left accent bar -->
  <rect x="0" y="0" width="6" height="640" fill="#58a6ff"/>

  <!-- Title -->
  <text x="80" y="170" fill="#e6edf3"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="60" font-weight="700" letter-spacing="-1">
    QA Agent Operating Framework
  </text>

  <!-- Subtitle -->
  <text x="80" y="220" fill="#8b949e"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="400">
    A platform-layer playbook for running QA with multiple AI Agents
  </text>

  <!-- 6 layers in 2 rows × 3 cols -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
     font-size="19" font-weight="500" fill="#e6edf3">

    <!-- Row 1 -->
    <rect x="80"  y="310" width="360" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="100" y="345">Layer A · Agent Topology</text>

    <rect x="460" y="310" width="360" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="480" y="345">Layer B · Knowledge</text>

    <rect x="840" y="310" width="360" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="860" y="345">Layer C · Governance</text>

    <!-- Row 2 -->
    <rect x="80"  y="380" width="360" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="100" y="415">Layer D · Sync &amp; GitOps</text>

    <rect x="460" y="380" width="360" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="480" y="415">Layer E · Secret &amp; Cloud</text>

    <rect x="840" y="380" width="360" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" stroke-dasharray="6 4"/>
    <text x="860" y="415">Layer F · Tool Capability</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="510" fill="#8b949e"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="400">
    Conventions, structures, and guardrails above your LLM / IDE.
  </text>

  <!-- Author -->
  <text x="80" y="572" fill="#6e7681"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="400">
    Williams Liu · me.twilliamstech.com · CC BY 4.0
  </text>

  <!-- right side decorative grid -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="1" fill="none">
    <line x1="1080" y1="0" x2="1080" y2="640"/>
    <line x1="1140" y1="0" x2="1140" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
  </g>
</svg>
